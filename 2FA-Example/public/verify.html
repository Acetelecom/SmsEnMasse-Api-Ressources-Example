<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Code — SmsEnMasse 2FA Example</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>Enter your code</h1>
        <p id="phoneDisplay">A 6-digit code was sent to your phone</p>
      </div>

      <form id="verifyForm">
        <div class="form-group">
          <label for="code">Verification Code</label>
          <input
            type="text"
            id="code"
            name="code"
            placeholder="000000"
            maxlength="6"
            inputmode="numeric"
            pattern="[0-9]{6}"
            autocomplete="one-time-code"
            required
          >
          <span class="field-hint">Code expires in 5 minutes</span>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary">
          Verify
        </button>
        <button type="button" id="backBtn" class="btn btn-secondary">
          Back
        </button>

        <div id="error" class="error-box hidden"></div>
      </form>
    </div>
  </div>

  <script src="js/verify.js"></script>
</body>
</html>
